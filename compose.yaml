services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-noema}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-noema_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-noema}

    ports:
      - "5432:5432"

    volumes:
      - noema_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-noema} -d ${POSTGRES_DB:-noema}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-noema}:${POSTGRES_PASSWORD:-noema_dev_password}@db:5432/${POSTGRES_DB:-noema}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-local-docker-development-secret-change-me}
      AUTH_TRUST_HOST: "true"

    command:
      [
        "npx",
        "prisma",
        "migrate",
        "deploy"
      ]

    depends_on:
      db:
        condition: service_healthy

    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-noema}:${POSTGRES_PASSWORD:-noema_dev_password}@db:5432/${POSTGRES_DB:-noema}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-local-docker-development-secret-change-me}
      AUTH_TRUST_HOST: "true"
      NODE_ENV: production

    ports:
      - "3000:3000"

    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  seed:
    build:
      context: .
      dockerfile: Dockerfile

    profiles:
      - seed

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-noema}:${POSTGRES_PASSWORD:-noema_dev_password}@db:5432/${POSTGRES_DB:-noema}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-local-docker-development-secret-change-me}
      AUTH_TRUST_HOST: "true"
      NODE_ENV: production
      ALLOW_DESTRUCTIVE_SEED: "true"

    command:
      [
        "npm",
        "run",
        "seed"
      ]

    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

    restart: "no"

volumes:
  noema_postgres_data: